workflows:
  # ---------------------------------------------------------------------------
  # Android build → Google Play
  # ---------------------------------------------------------------------------
  android-release:
    name: Android Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 22
      java: 21
      groups:
        - firebase        # GOOGLE_SERVICES_JSON (base64-encoded google-services.json)
        - android_signing  # CM_KEYSTORE, CM_KEY_ALIAS, CM_KEY_PASSWORD, CM_KEYSTORE_PASSWORD
        - env_vars         # NEXT_PUBLIC_API_URL, NEXT_PUBLIC_FIREBASE_*
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build Next.js static export
        script: |
          # Remove API routes — native app calls Vercel-hosted APIs via NEXT_PUBLIC_API_URL
          rm -rf src/app/api
          CAPACITOR_BUILD=true npm run build

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Set up google-services.json
        script: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode > android/app/google-services.json

      - name: Set up Android signing
        script: |
          echo $CM_KEYSTORE | base64 --decode > android/app/keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=keystore.jks
          EOF

      - name: Auto-increment version code
        script: |
          NEW_CODE=${BUILD_NUMBER:-2}
          sed -i "s/versionCode [0-9]*/versionCode $NEW_CODE/" android/app/build.gradle
          echo "versionCode set to $NEW_CODE"

      - name: Build Android release
        script: |
          cd android
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/mapping.txt

    publishing:
      email:
        recipients:
          - ben@example.com  # Update with your email
        notify:
          success: true
          failure: true

  # ---------------------------------------------------------------------------
  # iOS build → App Store / TestFlight
  # ---------------------------------------------------------------------------
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Tango App Store Connect
    environment:
      node: 22
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.comparebible.app
      groups:
        - firebase    # GOOGLE_SERVICES_PLIST (base64-encoded GoogleService-Info.plist)
        - env_vars    # NEXT_PUBLIC_API_URL, NEXT_PUBLIC_FIREBASE_*
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build Next.js static export
        script: |
          # Remove API routes — native app calls Vercel-hosted APIs via NEXT_PUBLIC_API_URL
          rm -rf src/app/api
          CAPACITOR_BUILD=true npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Set up GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICES_PLIST | base64 --decode > ios/App/App/GoogleService-Info.plist

      - name: Auto-increment build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number com.comparebible.app || echo 0)
          NEW_BUILD=$((LATEST + 1))
          cd ios/App
          agvtool new-version -all $NEW_BUILD
          echo "Build number set to $NEW_BUILD"

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build and export IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
