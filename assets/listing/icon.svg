<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF8F5"/>
      <stop offset="100%" stop-color="#F0ECE6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Left book -->
  <g>
    <!-- Book body -->
    <rect x="338" y="280" width="108" height="464" rx="8" fill="#7A6652"/>
    <!-- Spine highlight (inner edge) -->
    <rect x="434" y="288" width="6" height="448" rx="3" fill="#6B5A47"/>
    <!-- Page edges (horizontal lines suggesting pages) -->
    <line x1="352" y1="720" x2="432" y2="720" stroke="#F0ECE6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="352" y1="714" x2="432" y2="714" stroke="#F0ECE6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Cross on cover -->
    <line x1="393" y1="400" x2="393" y2="460" stroke="#F0ECE6" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
    <line x1="373" y1="420" x2="413" y2="420" stroke="#F0ECE6" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  </g>

  <!-- Right book -->
  <g>
    <!-- Book body -->
    <rect x="578" y="280" width="108" height="464" rx="8" fill="#7A6652"/>
    <!-- Spine highlight (inner edge) -->
    <rect x="584" y="288" width="6" height="448" rx="3" fill="#6B5A47"/>
    <!-- Page edges (horizontal lines suggesting pages) -->
    <line x1="598" y1="720" x2="678" y2="720" stroke="#F0ECE6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="598" y1="714" x2="678" y2="714" stroke="#F0ECE6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Cross on cover -->
    <line x1="637" y1="400" x2="637" y2="460" stroke="#F0ECE6" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
    <line x1="617" y1="420" x2="657" y2="420" stroke="#F0ECE6" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  </g>
</svg>
