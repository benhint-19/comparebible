<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <!-- Google Play feature graphic: 1024x500 -->
  <defs>
    <linearGradient id="feat-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF8F5"/>
      <stop offset="100%" stop-color="#EBE7E0"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="500" fill="url(#feat-bg)"/>

  <!-- Pause bars -->
  <rect x="356" y="110" width="56" height="200" rx="10" fill="#7A6652"/>
  <rect x="480" y="110" width="56" height="200" rx="10" fill="#7A6652"/>

  <!-- Wordmark -->
  <text x="446" y="400" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" letter-spacing="6" fill="#2C2A26">Selah</text>

  <!-- Tagline -->
  <text x="446" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="300" letter-spacing="4" fill="#8A8680">PAUSE AND REFLECT</text>

  <!-- Right side description -->
  <text x="730" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#6B6560">Compare Bible translations</text>
  <text x="730" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#6B6560">Listen in audio mode</text>
  <text x="730" y="285" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#6B6560">AI-powered analysis</text>
</svg>
